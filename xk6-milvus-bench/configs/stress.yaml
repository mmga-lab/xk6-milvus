# xk6-milvus-bench 压力测试配置
# 用于测试系统在高负载下的性能表现

# 继承默认配置
extends: default

# Milvus 连接配置
milvus:
  host: ${MILVUS_HOST:-localhost:19530}

# 集合配置 - 更大的数据集
collection:
  name_prefix: stress_test_
  vector_dim: 768  # 更高维度向量
  index:
    type: HNSW
    metric: L2
    params:
      M: 32  # 更大的 M 值
      efConstruction: 400

# 高压执行配置
execution:
  vus: 50  # 更多虚拟用户
  duration: 15m
  # 或使用分阶段压力测试
  # stages:
  #   - duration: 2m
  #     target: 10     # 预热
  #   - duration: 5m
  #     target: 50     # 正常压力
  #   - duration: 3m
  #     target: 100    # 峰值压力
  #   - duration: 3m
  #     target: 50     # 恢复
  #   - duration: 2m
  #     target: 0      # 冷却

# 压力测试阈值（略微放宽）
thresholds:
  search_p95_ms: 200
  search_p99_ms: 500
  insert_p95_ms: 1000
  min_recall: 0.90
  max_error_rate: 0.05

# K8s 配置 - 更多资源
kubernetes:
  namespace: k6-stress-tests
  image: harbor.milvus.io/milvus/k6-milvus:latest
  parallelism: 4  # 并行运行 4 个 pod
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 4Gi

# 场景配置
scenario:
  name: stress-test
  description: 压力测试 - 测试系统在高负载下的表现
  type: search
  setup:
    data_size: 100000  # 更多数据
    batch_size: 5000
  search:
    topk: 50  # 更大的 topK
    output_fields:
      - category
      - price
    nprobe: 32
    ef: 128
  variants:
    - name: basic
      filter: null
    - name: filtered_price
      filter: "price > 50"
    - name: filtered_category
      filter: "category == 'electronics'"
    - name: high_topk
      topk: 100
