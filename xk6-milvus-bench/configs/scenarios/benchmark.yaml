# Benchmark 测试场景配置
# 使用标准数据集进行性能评估

# 继承默认配置
extends: default

# 场景配置
scenario:
  name: benchmark-sift
  description: 使用 SIFT1M 标准数据集进行 benchmark 测试
  type: benchmark

  # 数据准备（使用预下载的数据集）
  setup:
    data_size: 1000000  # 1M 向量
    batch_size: 10000   # 批量插入大小

  # 搜索参数
  search:
    topk: 100  # Recall@100
    output_fields: []  # benchmark 只需要 id
    nprobe: 32
    ef: 128

  # Benchmark 数据集配置
  # 使用前需要先运行: xk6-milvus-bench dataset download <dataset>
  benchmark:
    # 数据集名称，支持：
    # - sift-128-euclidean (SIFT1M)
    # - gist-960-euclidean (GIST1M)
    # - glove-25-angular
    # - glove-100-angular
    # - fashion-mnist-784-euclidean
    # - mnist-784-euclidean
    dataset: sift-128-euclidean
    dimension: 128
    metric: L2
    # 数据集文件路径（由 CLI 自动设置）
    train_path: ${DATASET_TRAIN_PATH:-}
    test_path: ${DATASET_TEST_PATH:-}
    neighbors_path: ${DATASET_NEIGHBORS_PATH:-}

  variants: []  # benchmark 不使用变体

# 集合配置
collection:
  name_prefix: benchmark_
  vector_dim: 128
  index:
    type: HNSW
    metric: L2
    params:
      M: 16
      efConstruction: 200

# 执行配置
execution:
  vus: 10
  duration: 5m

# 阈值配置
thresholds:
  search_p95_ms: 50
  search_p99_ms: 100
  insert_p95_ms: 500
  min_recall: 0.95  # 95% 召回率
  max_error_rate: 0.001
