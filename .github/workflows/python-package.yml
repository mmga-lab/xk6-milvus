name: Python Package

on:
  push:
    branches: [main]
    paths:
      - "xk6-milvus-bench/**"
      - ".github/workflows/python-package.yml"
  pull_request:
    branches: [main]
    paths:
      - "xk6-milvus-bench/**"
      - ".github/workflows/python-package.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI"
        required: false
        default: false
        type: boolean

env:
  PACKAGE_DIR: xk6-milvus-bench

jobs:
  # 测试 Python 代码
  test:
    name: Test Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PACKAGE_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check src/

      - name: Test
        run: |
          source .venv/bin/activate
          pytest tests/ -v

  # 构建多平台 wheel
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            platform: linux-amd64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: darwin
            arch: amd64
            runner: macos-15
            platform: darwin-amd64
          - os: darwin
            arch: arm64
            runner: macos-14
            platform: darwin-arm64
          - os: windows
            arch: amd64
            runner: windows-latest
            platform: windows-amd64

    defaults:
      run:
        working-directory: ${{ env.PACKAGE_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false

      - name: Install xk6
        run: go install go.k6.io/xk6/cmd/xk6@latest

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Build wheel
        run: |
          uv build --wheel
        env:
          BUILD_K6: "1"

      - name: Rename wheel with platform tag
        shell: bash
        run: |
          cd dist
          for f in *.whl; do
            # 获取原文件名的各部分
            name=$(echo "$f" | sed 's/-py3-none-any\.whl$//')
            # 根据平台设置 wheel 标签
            case "${{ matrix.platform }}" in
              linux-amd64)
                new_name="${name}-py3-none-manylinux_2_17_x86_64.manylinux2014_x86_64.whl"
                ;;
              linux-arm64)
                new_name="${name}-py3-none-manylinux_2_17_aarch64.manylinux2014_aarch64.whl"
                ;;
              darwin-amd64)
                new_name="${name}-py3-none-macosx_10_12_x86_64.whl"
                ;;
              darwin-arm64)
                new_name="${name}-py3-none-macosx_11_0_arm64.whl"
                ;;
              windows-amd64)
                new_name="${name}-py3-none-win_amd64.whl"
                ;;
            esac
            mv "$f" "$new_name"
            echo "Renamed $f to $new_name"
          done

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl
          if-no-files-found: error

  # 构建源码分发包（不含 k6 二进制）
  build-sdist:
    name: Build source distribution
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PACKAGE_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Build sdist
        run: |
          uv build --sdist
        env:
          BUILD_K6: "0"

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ${{ env.PACKAGE_DIR }}/dist/*.tar.gz
          if-no-files-found: error

  # 发布到 PyPI
  publish:
    name: Publish to PyPI
    needs: [build, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    environment:
      name: pypi
      url: https://pypi.org/project/xk6-milvus-bench/
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # 发布到 TestPyPI（用于测试）
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/xk6-milvus-bench/
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
