linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - exportloopref
    - gocyclo
    - misspell
    - revive
  disable:
    - structcheck  # deprecated
    - varcheck     # deprecated
    - deadcode     # deprecated

linters-settings:
  govet:
    check-shadowing: true
    enable-all: true

  errcheck:
    check-type-assertions: true
    check-blank: true

  gocyclo:
    min-complexity: 15

  revive:
    rules:
      - name: var-naming
        disabled: false
      - name: exported
        disabled: false

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec

  # Maximum count of issues with the same text
  max-same-issues: 50

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
  modules-download-mode: readonly
